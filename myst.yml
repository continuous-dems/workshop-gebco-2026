version: 1

project:
  title: "CUDEM/GEBCO Workshop 2026"
  # description:
  # keywords: []
  # authors: []
  license: "MIT"
  github: &repo-url "https://github.com/continuous-dems/workshop-gebco-2026"
  error_rules:
    - rule: "doi-link-valid"
      severity: "warn"
  exclude:
    - "_*"
    - "README.md"
  toc:
    - file: "index.md"
    - pattern: "0*.md"
    - title: "Modules"
      children:
        - file: "modules/01-working-in-jupyterhub/index.md"
        - title: "🗓️ Day 1"
          children:
            - pattern: "modules/02-day1/0*/index.{md,ipynb}"
        - title: "🗓️ Day 2"
          children:
            - pattern: "modules/03-day2/0*/index.{md,ipynb}"
    - title: "Reference"
      children:
        - pattern: "reference/*.md"
    - title: "For instructors"
      children:
        - pattern: "for-instructors/*.md"


site:
  template: "book-theme"
  actions:
    - title: "View source"
      url: *repo-url
  options:
    folders: true
    style: "assets/styles/style.css"
    # favicon: favicon.ico
    # logo: site_logo.png
    logo_text: "CUDEM/GEBCO Workshop 2026"
